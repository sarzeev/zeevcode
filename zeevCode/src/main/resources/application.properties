# ??? Server ???????????????????????????????????????????
server.port=8081
  
  # ??? Database ?????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zeevcode}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver
  
  # ??? JPA / Hibernate ??????????????????????????????????
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
  
  # ??? Flyway ???????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
  
# ─── Security ───────────────────────────────────────────────
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://localhost:5175}
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/zeevcode1
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com

# ─── Firebase Admin ────────────────────────────────────────
firebase.credentials.path=../secrets/firebase-service-account.json
  # ??? WebSocket ????????????????????????????????????????
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536
  
  # ??? DevTools ?????????????????????????????????????????
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
  
  # ??? Logging ??????????????????????????????????????????
logging.level.root=INFO
logging.level.com.project.zeevCode=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ─── Execution Provider ─────────────────────────────
# Options: piston, legacy-processbuilder, judge0, native
execution.provider=native

# ─── Piston Configuration ──────────────────────────
piston.api.url=http://localhost:2000
piston.timeout.run=5000
piston.timeout.compile=10000
piston.memory.run=256000000